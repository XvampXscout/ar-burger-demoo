<!DOCTYPE html>
<html>
<head>
<title>AR Burger Demo</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

model-viewer{
width:100%;
height:600px;
}
  #ar-button{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
padding:15px 25px;
font-size:20px;
border:none;
border-radius:12px;
background:#ff6b00;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Classic Burger</h1>

<p>Rs. 1250</p>

<model-viewer
src="kfc_burger.glb"
camera-controls
auto-rotate
ar
ar-modes="webxr scene-viewer quick-look">

<button slot="ar-button" id="ar-button">
🍔 View Burger in AR
</button>

</model-viewer>

</body>
</html>
